<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="styles.css" />

    <title>Frontend Mentor | NFT preview card component</title>
  </head>
  <body>
    <main>
      <article class="card">
        <figure class="card__hero">
          <img
            src="images/image-equilibrium.jpg"
            alt="Glowing translucent cube balancing on one edge on a reflective surface against a dark blue background."
            height="604"
            width="604"
            class="card__hero-img"
          />
          <button
            type="button"
            class="card__hero-btn"
            arial-label="Open image preview"
            onclick="alert('yay, you are learning new thigns! be happy!')"
          >
            <img
              src="images/icon-view.svg"
              alt=""
              class="card__hero-icon"
              aria-hidden="true"
            />
          </button>
        </figure>
        <h1 class="card__title">Equilibrium #3429</h1>
        <p class="card__text">
          Our Equilibrium collection promotes balance and calm.
        </p>
        <ul class="card__data">
          <li class="card__data-item">
            <img
              src="images/icon-ethereum.svg"
              alt=""
              width="11"
              height="18"
              class="card__etherium-icon"
            />
            <p class="card__nft-price">0.041 ETH</p>
          </li>
          <li class="card__data-item">
            <img
              src="images/icon-clock.svg"
              alt=""
              width="17"
              height="17"
              class="card__clock-icon"
            />
            <p class="card__time">3 days left</p>
          </li>
        </ul>
        <footer class="card__footer">
          <img
            src="images/image-avatar.png"
            alt=""
            width="132"
            height="132"
            class="card__creator-img"
          />
          <p class="card__creator">
            <span class="card__creator-text">Creation of</span
            ><span class="card__creator-name">Jules Wyvern</span>
          </p>
        </footer>
      </article>
    </main>
  </body>
</html>
